name: Product Pipeline

on:
  schedule:
    - cron: '30 3 * * *'    # Daily  — 9:00 AM IST (3:30 UTC)
    - cron: '30 17 * * 6'   # Weekly — Saturday 11:00 PM IST (17:30 UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        type: choice
        options:
          - daily
          - weekly

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install playwright groq google-genai
          playwright install chromium --with-deps

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" == "30 3 * * *" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          else
            echo "mode=weekly" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python phase5_automation/scheduler.py --mode ${{ steps.mode.outputs.mode }}

      - name: Copy data to frontend public/data
        run: |
          mkdir -p phase4_frontend/public/data
          cp output/*.json phase4_frontend/public/data/

      - name: Commit and push updated data
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add phase4_frontend/public/data/
          git commit -m "data: ${{ steps.mode.outputs.mode }} update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
