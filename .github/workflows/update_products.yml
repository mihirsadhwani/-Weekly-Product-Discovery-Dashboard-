name: Update Product Data

on:
  schedule:
    # Daily at 9am IST (3:30am UTC)
    - cron: '30 3 * * *'

    # Weekly Sunday 11pm IST (5:30pm UTC Sunday)
    - cron: '30 17 * * 0'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Update mode (daily or weekly)'
        required: true
        type: choice
        options:
          - daily
          - weekly

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install playwright groq python-dotenv
        playwright install chromium

    - name: Determine update mode
      id: mode
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          MODE="${{ github.event.inputs.mode }}"
        elif [ "${{ github.event.schedule }}" == "30 3 * * *" ]; then
          MODE="daily"
        else
          MODE="weekly"
        fi
        echo "mode=$MODE" >> $GITHUB_OUTPUT

    - name: Run daily light scrape
      if: steps.mode.outputs.mode == 'daily'
      run: |
        echo "Running daily light scrape..."
        cd phase1_scraping
        python run_light_scrape.py

    - name: Run weekly scrape
      if: steps.mode.outputs.mode == 'weekly'
      run: |
        echo "Running weekly scrape..."
        cd phase1_scraping
        python run_scraper.py

    - name: Run AI analysis (weekly only)
      if: steps.mode.outputs.mode == 'weekly'
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        echo "Running AI analysis..."
        cd phase2_analysis
        python run_analysis.py

    - name: Run final prep (weekly only)
      if: steps.mode.outputs.mode == 'weekly'
      run: |
        echo "Preparing final output..."
        cd phase3_final_output
        python run_prepare.py

    - name: Copy data to frontend
      run: |
        mkdir -p phase4_frontend/public/data
        cp output/*.json phase4_frontend/public/data/

    - name: Commit and push changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "Product Discovery Bot"
        git config user.email "bot@github-actions"
        git add phase4_frontend/public/data/

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M IST')
          if [ "${{ steps.mode.outputs.mode }}" == "daily" ]; then
            git commit -m "data: daily update $TIMESTAMP"
          else
            git commit -m "data: weekly update $TIMESTAMP"
          fi
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main
          echo "Changes committed and pushed"
        fi
